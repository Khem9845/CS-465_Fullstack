<div class="container mt-4">
  <div class="row">
    <div class="col-md-8 offset-md-2">
      <h3>Edit Trip</h3>
      <hr>
      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Trip Code</label>
          <input type="text" class="form-control" [(ngModel)]="trip.code" name="code" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Trip Name</label>
          <input type="text" class="form-control" [(ngModel)]="trip.name" name="name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Length</label>
          <input type="text" class="form-control" [(ngModel)]="trip.length" name="length">
        </div>
        <div class="mb-3">
          <label class="form-label">Start Date</label>
          <input type="date" class="form-control" [(ngModel)]="trip.start" name="start">
        </div>
        <div class="mb-3">
          <label class="form-label">Resort</label>
          <input type="text" class="form-control" [(ngModel)]="trip.resort" name="resort">
        </div>
        <div class="mb-3">
          <label class="form-label">Price Per Person ($)</label>
          <input type="text" class="form-control" [(ngModel)]="trip.perPerson" name="perPerson">
        </div>
        <div class="mb-3">
          <label class="form-label">Image Filename</label>
          <input type="text" class="form-control" [(ngModel)]="trip.image" name="image">
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea class="form-control" [(ngModel)]="trip.description" name="description" rows="4"></textarea>
        </div>
        <button type="submit" class="btn btn-primary me-2">Update Trip</button>
        <button type="button" class="btn btn-secondary" (click)="goBack()">Cancel</button>
      </form>
    </div>
  </div>
</div>
