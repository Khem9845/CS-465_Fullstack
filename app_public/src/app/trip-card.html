<div class="col-md-4 mb-4">
  <div class="card h-100 shadow-sm">
    <img class="card-img-top" 
      src="/img/{{ trip.image }}" 
      alt="{{ trip.name }}"
      onerror="this.src='https://placehold.co/400x200?text=Trip+Image'">
    <div class="card-body">
      <h5 class="card-title">{{ trip.name }}</h5>
      <h6 class="card-subtitle mb-2 text-muted">{{ trip.resort }}</h6>
      <p class="card-text small">{{ trip.length }} &mdash; ${{ trip.perPerson }}/person</p>
      <p class="card-text">{{ trip.description }}</p>
    </div>
    <div class="card-footer d-flex justify-content-between align-items-center">
      <button class="btn btn-sm btn-primary" (click)="editTrip(trip)">
        Edit Trip
      </button>
      <small class="text-muted">{{ trip.start | date:'mediumDate' }}</small>
    </div>
  </div>
</div>
